name: Alexa Bridge Admin
version: 0.2.4
slug: alexa_bridge_admin
description: Bridge em PyScript para integrar Alexa Skill e Home Assistant via MQTT.
ingress: true
ingress_port: 8099
panel_icon: mdi:Bridge
panel_title: Alexa Bridge
startup: services
boot: auto
hassio_api: true
homeassistant_api: true
hassio_role: manager
auth_api: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
map:
  - homeassistant_config:rw
options:
  log_level: info
schema:
  log_level: list(trace|debug|info|warning|error|critical)
